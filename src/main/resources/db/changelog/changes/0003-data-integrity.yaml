databaseChangeLog:
  - changeSet:
      id: 0003-add-data-integrity-constraints
      author: codex
      changes:
        - addNotNullConstraint:
            tableName: users
            columnName: login
            columnDataType: VARCHAR(100)
        - addNotNullConstraint:
            tableName: users
            columnName: password_hash
            columnDataType: VARCHAR(255)
        - addNotNullConstraint:
            tableName: users
            columnName: created_at
            columnDataType: TIMESTAMP
        - addNotNullConstraint:
            tableName: users
            columnName: updated_at
            columnDataType: TIMESTAMP
        - addNotNullConstraint:
            tableName: tasks
            columnName: title
            columnDataType: VARCHAR(255)
        - addNotNullConstraint:
            tableName: tasks
            columnName: status
            columnDataType: VARCHAR(20)
        - addNotNullConstraint:
            tableName: tasks
            columnName: user_id
            columnDataType: BIGINT
        - addNotNullConstraint:
            tableName: tasks
            columnName: created_at
            columnDataType: TIMESTAMP
        - addNotNullConstraint:
            tableName: tasks
            columnName: updated_at
            columnDataType: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: user_id
            constraintName: fk_tasks_user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: RESTRICT
        - sql:
            sql: ALTER TABLE tasks ADD CONSTRAINT chk_tasks_status CHECK (status IN ('OPEN', 'DONE', 'CLOSED'));
        - createIndex:
            tableName: tasks
            indexName: idx_tasks_user_status_planned_for_at
            columns:
              - column:
                  name: user_id
              - column:
                  name: status
              - column:
                  name: planned_for_at
        - createIndex:
            tableName: tasks
            indexName: idx_tasks_user_deadline_at
            columns:
              - column:
                  name: user_id
              - column:
                  name: deadline_at
