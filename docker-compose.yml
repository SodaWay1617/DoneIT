services:
  postgres:
    image: postgres:17-alpine
    container_name: doneit-postgres
    environment:
      POSTGRES_DB: doneit
      POSTGRES_USER: doneit
      POSTGRES_PASSWORD: doneit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doneit -d doneit"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: doneit-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/doneit
      SPRING_DATASOURCE_USERNAME: doneit
      SPRING_DATASOURCE_PASSWORD: doneit
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres-data: